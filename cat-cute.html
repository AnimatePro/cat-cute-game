<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Cat Cute</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#3b2c1e;touch-action:manipulation}
    body{
      font-family:'Press Start 2P',monospace;display:flex;justify-content:center;align-items:center;
      background:radial-gradient(circle at 30% 30%,#5e3e2b,#2d1e12);
      user-select:none;-webkit-tap-highlight-color:transparent;image-rendering:pixelated;
    }
    #game-container{
      width:100%;max-width:420px;height:100%;display:flex;flex-direction:column;
      padding:env(safe-area-inset-top) 12px env(safe-area-inset-bottom) 12px;
      transition:transform 0.1s ease;
    }
    .top-panel{
      display:flex;justify-content:space-between;align-items:center;
      padding:8px 4px;color:#fde4c3;font-size:0.7rem;text-shadow:2px 2px 0 #3b2c1e;
    }
    .currency{display:flex;gap:8px}
    .currency-item{display:flex;align-items:center;gap:4px}
    .score{font-size:1.1rem;color:#ffd966}
    .combo-bar{
      width:100%;height:10px;background:#634b30;border:2px solid #3e2b1c;border-radius:4px;
      margin:4px 0 8px;overflow:hidden
    }
    .combo-fill{height:100%;width:0;background:#ffb347;transition:width 0.1s linear}
    .combo-label{text-align:center;font-size:0.65rem;color:#ffe3a5;min-height:1.2rem}
    .tap-arena{
      flex:1;display:flex;justify-content:center;align-items:center;position:relative;
      margin:8px 0;cursor:pointer;background:rgba(0,0,0,0.05);border-radius:16px;overflow:hidden
    }
    .kitty-container{
      position:relative;pointer-events:none;
      filter:drop-shadow(0 6px 8px rgba(0,0,0,0.5));
      animation:kittyIdle 2s ease-in-out infinite;
    }
    @keyframes kittyIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
    .kitty-bounce{animation:kittyBounce 0.3s ease-out}
    @keyframes kittyBounce{0%{transform:scale(1) translateY(0)}30%{transform:scale(0.85) translateY(-8px)}70%{transform:scale(1.1) translateY(4px)}100%{transform:scale(1) translateY(0)}}
    .base-kitty{font-size:100px}
    .hat{position:absolute;top:-32px;left:50%;transform:translateX(-50%);font-size:36px}
    .particle{
      position:absolute;pointer-events:none;font-family:'Press Start 2P',monospace;
      font-size:0.7rem;color:#fde4c3;text-shadow:2px 2px 0 #3b2c1e;
      will-change:transform,opacity;transform:translate(-50%,-50%);left:50%;top:50%
    }
    .ripple{
      position:absolute;pointer-events:none;width:20px;height:20px;border-radius:50%;
      background:rgba(255,255,200,0.4);transform:scale(0);animation:ripple 0.5s ease-out forwards
    }
    @keyframes ripple{to{transform:scale(4);opacity:0}}
    .boss-hp-bar{
      position:absolute;top:10px;left:50%;transform:translateX(-50%);width:80%;height:12px;
      background:#634b30;border:2px solid #3e2b1c;border-radius:6px;overflow:hidden;z-index:20
    }
    .boss-hp-fill{height:100%;background:#ff4444;transition:width 0.1s}
    .btn-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:6px 0 12px}
    .btn{
      background:#d18f47;border:3px solid #3e2b1c;color:#2d1e12;padding:8px 12px;
      font-family:'Press Start 2P',monospace;font-size:0.55rem;box-shadow:3px 3px 0 #3e2b1c;
      cursor:pointer;transition:transform 0.1s,filter 0.2s;display:flex;align-items:center;gap:4px
    }
    .btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #3e2b1c;filter:brightness(0.9)}
    .btn.accent{background:#f4b642}
    .modal{
      position:fixed;top:0;left:0;width:100%;height:100%;
      background:rgba(0,0,0,0.75);display:flex;justify-content:center;align-items:center;z-index:100;
      visibility:hidden;opacity:0;transition:0.2s ease;
    }
    .modal.open{visibility:visible;opacity:1}
    .modal-content{
      background:#4a3522;color:#fde4c3;border:4px solid #3e2b1c;border-radius:8px;
      padding:16px;width:88%;max-width:360px;max-height:75vh;overflow-y:auto;
      font-size:0.55rem;line-height:1.5;box-shadow:6px 6px 0 #1f140a;
      transform:scale(0.9);transition:transform 0.2s ease;
    }
    .modal.open .modal-content{transform:scale(1)}
    .modal-content h3{text-align:center;margin-bottom:12px;font-size:0.75rem;text-shadow:3px 3px 0 #3e2b1c}
    .upgrade-row,.ach-row,.quest-row{
      display:flex;justify-content:space-between;align-items:center;padding:8px 0;
      border-bottom:2px solid #5e3e2b
    }
    .buy-btn{
      background:#f4b642;border:2px solid #3e2b1c;color:#2d1e12;padding:4px 10px;
      font-family:inherit;font-size:0.5rem;cursor:pointer;box-shadow:2px 2px 0 #3e2b1c
    }
    .buy-btn:active{transform:translate(1px,1px);box-shadow:none}
    .buy-btn:disabled{background:#887a6b;cursor:default}
    .mini-game-area{
      height:200px;background:#2d1e12;border:2px solid #5e3e2b;position:relative;
      overflow:hidden;margin:8px 0
    }
    .falling-star{
      position:absolute;font-size:1.5rem;cursor:pointer;animation:fall linear forwards;pointer-events:auto
    }
    @keyframes fall{to{transform:translateY(220px)}}
    #toast-container{
      position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;
      flex-direction:column-reverse;gap:6px;z-index:200;pointer-events:none;max-width:90%
    }
    .toast{
      background:#3e2b1c;color:#ffd966;border:2px solid #ffb347;padding:8px 16px;
      font-family:inherit;font-size:0.6rem;opacity:0;transform:translateY(10px);
      transition:0.2s;white-space:nowrap;text-align:center
    }
    .toast.show{opacity:1;transform:translateY(0)}
    .pet{
      position:absolute;bottom:10px;font-size:1.8rem;pointer-events:none;
      animation:petWalk 8s linear infinite;
    }
    @keyframes petWalk{0%{left:-10%}100%{left:110%}}
    .season-layer{
      position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5
    }
    .mood-indicator{
      position:absolute;top:8px;right:8px;font-size:1.2rem;z-index:10
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div class="top-panel">
      <div class="currency">
        <div class="currency-item">🌰 <span id="seedsDisplay">0</span></div>
        <div class="currency-item">💎 <span id="crystalsDisplay">0</span></div>
      </div>
      <div id="comboLabel" class="combo-label"></div>
    </div>
    <div class="combo-bar"><div id="comboFill" class="combo-fill"></div></div>
    <div class="tap-arena" id="tapArena">
      <div class="season-layer" id="seasonLayer"></div>
      <div class="mood-indicator" id="moodIcon">😺</div>
      <div class="kitty-container" id="kittyContainer">
        <div class="base-kitty" id="baseKitty">🐱</div>
        <div class="hat" id="hatSlot"></div>
        <div id="emotionCloud" style="position:absolute;top:-50px;left:50%;transform:translateX(-50%);font-size:1.8rem;opacity:0;transition:0.3s"></div>
      </div>
      <div class="pet" id="petComp" style="display:none">🐭</div>
    </div>
    <div class="btn-row">
      <button class="btn" id="shopBtn">🛒 Shop</button>
      <button class="btn" id="boostBtn">⚡ Boost</button>
      <button class="btn" id="customBtn">🎨 Style</button>
      <button class="btn" id="questsBtn">📋 Quests</button>
      <button class="btn" id="achievementsBtn">🏆</button>
      <button class="btn" id="dailyBtn">🎁</button>
      <button class="btn accent" id="evolveBtn">⭐ Evolve</button>
      <button class="btn" id="challengeBtn">⚔️ Challenge</button>
    </div>
  </div>

  <!-- Модальные окна -->
  <div class="modal" id="shopModal"><div class="modal-content"><h3>🛒 Upgrades</h3><div id="shopList"></div><button class="btn close-modal" style="margin-top:10px;width:100%">Close</button></div></div>
  <div class="modal" id="boostModal"><div class="modal-content"><h3>⚡ Boosters</h3><div id="boostList"></div><button class="btn close-modal" style="margin-top:10px;width:100%">Close</button></div></div>
  <div class="modal" id="customModal"><div class="modal-content"><h3>🎨 Customization</h3>
    <div id="tabs"><button class="btn tab-btn active" data-tab="hats">Hats</button><button class="btn tab-btn" data-tab="backgrounds">Backgrounds</button><button class="btn tab-btn" data-tab="skins">Skins</button></div>
    <div id="hatShop" class="tab-content"></div>
    <div id="bgShop" class="tab-content" style="display:none"></div>
    <div id="skinShop" class="tab-content" style="display:none"></div>
    <button class="btn close-modal" style="margin-top:10px;width:100%">Close</button>
  </div></div>
  <div class="modal" id="questsModal"><div class="modal-content"><h3>📋 Daily Quests</h3><div id="questList"></div><button class="btn close-modal" style="margin-top:10px;width:100%">Close</button></div></div>
  <div class="modal" id="achievementsModal"><div class="modal-content"><h3>🏆 Achievements</h3><div id="achList"></div><button class="btn close-modal" style="margin-top:10px;width:100%">Close</button></div></div>
  <div class="modal" id="dailyModal"><div class="modal-content"><h3>🎁 Daily Gift</h3><div id="dailyContent"></div><button class="btn close-modal" style="margin-top:10px;width:100%">Close</button></div></div>
  <div class="modal" id="evolveModal"><div class="modal-content"><h3>⭐ Evolution</h3><div id="evolveContent"></div><button class="btn close-modal" style="margin-top:10px;width:100%">Close</button></div></div>
  <div class="modal" id="challengeModal"><div class="modal-content"><h3>⚔️ Challenge (60s)</h3><p>Tap as much as you can!</p><div id="challengeTimer">60</div><div id="challengeScore">0</div><button class="btn close-modal" style="margin-top:10px;width:100%">Exit</button></div></div>
  <div class="modal" id="miniGameModal"><div class="modal-content"><h3>🌟 Catch the Star!</h3><div class="mini-game-area" id="miniGameArea"></div><p>Caught: <span id="miniCaught">0</span>/10</p><button class="btn close-modal" style="margin-top:10px;width:100%">Exit</button></div></div>
  <div class="modal" id="collectionModal"><div class="modal-content"><h3>🃏 Cat Cards</h3><div id="collectionGrid"></div><button class="btn close-modal" style="margin-top:10px;width:100%">Close</button></div></div>
  <div id="toast-container"></div>

  <script>
    (()=>{
      "use strict";

      const tg = window.Telegram?.WebApp;
      if(tg){ tg.ready(); tg.expand(); }

      // ------- Game State -------
      let seeds=0, crystals=0, combo=1, comboTimer=0, comboTimestamp=0;
      const COMBO_TIMEOUT=2500;

      const upgrades={
        autoTapper:{level:0,baseCost:20,costMult:1.7,value:0.3,name:'Auto Paw',desc:'+{val} seeds/s'},
        tapPower:{level:0,baseCost:15,costMult:1.6,value:1,name:'Tap Power',desc:'+{val} per tap'},
        critChance:{level:0,baseCost:80,costMult:2.3,value:0.04,name:'Crit Claw',desc:'+{val}% crit (x3)'},
        comboBoost:{level:0,baseCost:150,costMult:2.0,value:0.15,name:'Combo Cat',desc:'+{val}x combo'}
      };

      let evolveStage=0;
      const evolveNames=['🐱 Kitten','⚔️ Cat Warrior','🔮 Cat Mage','🌟 Legendary Cat'];
      const evolveCost=[0,500,3000,15000];
      let permMultiplier=1;

      let currentHat=null, currentBg=null, currentSkin='default';
      const hats=[
        {id:'none',emoji:'',name:'No Hat',cost:0},
        {id:'crown',emoji:'👑',name:'Crown',cost:5},
        {id:'tophat',emoji:'🎩',name:'Top Hat',cost:3},
        {id:'cap',emoji:'🧢',name:'Cap',cost:2}
      ];
      const backgrounds=[
        {id:'default',color:'radial-gradient(circle at 30% 30%, #5e3e2b, #2d1e12)',name:'Wood',cost:0},
        {id:'meadow',color:'radial-gradient(circle at 20% 40%, #7ba05b, #4a6b3a)',name:'Meadow',cost:5},
        {id:'sky',color:'radial-gradient(circle at 10% 70%, #a2c8f2, #6382a2)',name:'Sky',cost:7},
        {id:'night',color:'radial-gradient(circle at 10% 70%, #2a2a4a, #10101a)',name:'Night',cost:10}
      ];
      const skins=[
        {id:'default',emoji:'🐱',name:'Classic',cost:0},
        {id:'ninja',emoji:'🥷',name:'Ninja',cost:15},
        {id:'unicorn',emoji:'🦄',name:'Unicorn',cost:20},
        {id:'robot',emoji:'🤖',name:'Robot',cost:25}
      ];

      let achievementsList=[
        {id:'first50',name:'First Harvest',desc:'50 seeds',goal:50,rewardSeeds:30,rewardCrystals:0},
        {id:'combo5',name:'Combo Master',desc:'Combo x5',goal:5,rewardSeeds:80,rewardCrystals:1},
        {id:'tap300',name:'Tireless',desc:'300 taps',goal:300,rewardSeeds:100,rewardCrystals:0},
        {id:'evolve1',name:'New Form',desc:'1 evolution',goal:1,rewardSeeds:200,rewardCrystals:3},
        {id:'crystal10',name:'Crystalized',desc:'10 crystals',goal:10,rewardSeeds:0,rewardCrystals:5}
      ];
      let totalTaps=0;
      let unlockedAchievements=[];

      const allCards=['🐱','😺','😸','😻','😽','😼','🙀','😿','😾','🐱‍👤'];
      let collectedCards=[];

      let activeBoost={doubleTap:0, autoCrit:0, fastAuto:0};
      let boss=null;
      const BOSS_COOLDOWN=1800;
      let bossTimer=BOSS_COOLDOWN;
      let lastSaveTime=Date.now();

      // Настроение
      let mood=100, maxMood=100;
      const moodDecay=0.5;
      let moodBoostActive=false;

      // Питомец
      let petActive=false, petLevel=0;
      const petEmojis=['🐭','🐹','🐰','🦊'];
      let petIntervalId=null;

      // Испытание
      let challengeActive=false, challengeTimer=60, challengeScore=0, challengeIntervalId=null;

      // Сезоны и музыка
      let currentSeason='spring';
      const seasonEmojis={spring:'🌸',summer:'☀️',autumn:'🍂',winter:'❄️'};
      let musicInterval=null;

      let dailyStreak=0, lastDailyDate=null;
      let dailyQuests=[], lastQuestDate=null;

      // ---- DOM ----
      const seedsDisplay=document.getElementById('seedsDisplay');
      const crystalsDisplay=document.getElementById('crystalsDisplay');
      const comboFill=document.getElementById('comboFill');
      const comboLabel=document.getElementById('comboLabel');
      const tapArena=document.getElementById('tapArena');
      const kittyContainer=document.getElementById('kittyContainer');
      const hatSlot=document.getElementById('hatSlot');
      const gameContainer=document.getElementById('game-container');
      const toastContainer=document.getElementById('toast-container');
      const emotionCloud=document.getElementById('emotionCloud');
      const moodIcon=document.getElementById('moodIcon');
      const petComp=document.getElementById('petComp');
      const seasonLayer=document.getElementById('seasonLayer');

      // Аудио контекст
      let audioCtx=null;
      function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();}
      function playMeow(p=1){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.setValueAtTime(400*p,audioCtx.currentTime);o.frequency.linearRampToValueAtTime(600*p,audioCtx.currentTime+0.08);o.frequency.setValueAtTime(500*p,audioCtx.currentTime+0.12);g.gain.setValueAtTime(0.1,audioCtx.currentTime);g.gain.linearRampToValueAtTime(0.15,audioCtx.currentTime+0.05);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);o.connect(g).connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.2);}
      function playSeedShake(){if(!audioCtx)return;const n=audioCtx.createBufferSource();const b=audioCtx.createBuffer(1,2048,audioCtx.sampleRate);const d=b.getChannelData(0);for(let i=0;i<2048;i++)d[i]=Math.random()*2-1;n.buffer=b;const bp=audioCtx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=3000;bp.Q.value=0.8;const g=audioCtx.createGain();g.gain.setValueAtTime(0.08,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.05);n.connect(bp).connect(g).connect(audioCtx.destination);n.start();n.stop(audioCtx.currentTime+0.05);}
      function playBling(){if(!audioCtx)return;[800,1200].forEach(f=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.1,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);o.connect(g).connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.2);});}
      function playMagicArp(){if(!audioCtx)return;const n=[523.25,659.25,783.99,1046.5];n.forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(0,audioCtx.currentTime+i*0.08);g.gain.linearRampToValueAtTime(0.12,audioCtx.currentTime+i*0.08+0.04);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+i*0.08+0.15);o.connect(g).connect(audioCtx.destination);o.start(audioCtx.currentTime+i*0.08);o.stop(audioCtx.currentTime+i*0.08+0.15);});}
      function startMusic(){if(musicInterval)return;const notes=[262,294,330,349,392,440,494,523];let idx=0;musicInterval=setInterval(()=>{if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='triangle';o.frequency.value=notes[idx%notes.length];g.gain.setValueAtTime(0.02,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);o.connect(g).connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.2);idx++;},600);}
      function stopMusic(){if(musicInterval){clearInterval(musicInterval);musicInterval=null;}}

      // Toast
      function showToast(msg,d=2500){
        if(toastContainer.children.length>3) toastContainer.lastChild.remove();
        const t=document.createElement('div');t.className='toast show';t.textContent=msg;
        toastContainer.appendChild(t);
        setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),200)},d);
      }

      // Пул частиц
      const PARTICLE_POOL=40;
      const particlePool=[];
      for(let i=0;i<PARTICLE_POOL;i++){const el=document.createElement('div');el.className='particle';el.style.opacity='0';tapArena.appendChild(el);particlePool.push({el,life:0,vy:0,vx:0});}
      let pIndex=0;
      function emitParticle(x,y,text,color='#fde4c3'){const p=particlePool[pIndex];pIndex=(pIndex+1)%PARTICLE_POOL;p.life=0.7;p.el.textContent=text;p.el.style.color=color;p.el.style.left=x+'px';p.el.style.top=y+'px';p.el.style.opacity='1';p.el.style.transform='translate(-50%,-50%)';p.vy=-50-Math.random()*40;p.vx=(Math.random()-0.5)*35;}
      function spawnRipple(x,y){const r=document.createElement('div');r.className='ripple';r.style.left=x+'px';r.style.top=y+'px';tapArena.appendChild(r);r.addEventListener('animationend',()=>r.remove());}
      function spawnPaw(x,y){const el=document.createElement('div');el.style.cssText=`position:absolute;left:${x}px;top:${y}px;font-size:1.2rem;pointer-events:none;opacity:0.8;`;el.textContent='🐾';tapArena.appendChild(el);const sY=y;function anim(){const dy=parseFloat(el.style.top||sY)-2;el.style.top=dy+'px';el.style.opacity=parseFloat(el.style.opacity)-0.02;if(parseFloat(el.style.opacity)>0&&dy>sY-40)requestAnimationFrame(anim);else el.remove();}requestAnimationFrame(anim);}
      function spawnHeart(x,y){const el=document.createElement('div');el.style.cssText=`position:absolute;left:${x}px;top:${y}px;font-size:1.4rem;pointer-events:none;opacity:0.9;`;el.textContent='💖';tapArena.appendChild(el);const sY=y;function anim(){const dy=parseFloat(el.style.top||sY)-1.5;const dx=parseFloat(el.style.left||x)+(Math.random()-0.5)*1;el.style.top=dy+'px';el.style.left=dx+'px';el.style.opacity=parseFloat(el.style.opacity)-0.015;if(parseFloat(el.style.opacity)>0&&dy>sY-50)requestAnimationFrame(anim);else el.remove();}requestAnimationFrame(anim);}

      // Настроение
      function updateMood(dt){
        mood=Math.max(0,Math.min(maxMood, mood - moodDecay*dt));
        moodIcon.textContent=mood>60?'😺':mood>30?'😿':'😾';
        if(mood>=80&&!moodBoostActive){
          moodBoostActive=true;
          showToast('Ultra Purr! Boost active!');
          activeBoost.fastAuto=Math.max(activeBoost.fastAuto,10);
        }else if(mood<80&&moodBoostActive){
          moodBoostActive=false;
        }
      }
      function boostMood(amount){mood=Math.min(maxMood,mood+amount);}

      // Сезоны
      function updateSeason(){
        const month=new Date().getMonth();
        if(month>=2&&month<=4)currentSeason='spring';
        else if(month>=5&&month<=7)currentSeason='summer';
        else if(month>=8&&month<=10)currentSeason='autumn';
        else currentSeason='winter';
        seasonLayer.innerHTML='';
        for(let i=0;i<5;i++){
          const s=document.createElement('span');
          s.style.cssText=`position:absolute;font-size:1.5rem;opacity:0.5;left:${Math.random()*100}%;top:${Math.random()*100}%;`;
          s.textContent=seasonEmojis[currentSeason];
          seasonLayer.appendChild(s);
        }
      }

      // Эмоции
      function showEmotion(emoji){
        emotionCloud.textContent=emoji;emotionCloud.style.opacity='1';
        setTimeout(()=>emotionCloud.style.opacity='0',1500);
      }

      // Питомец (вызов при загрузке и активации)
      function startPet(){
        if(petIntervalId) return;
        petComp.style.display='block';
        petComp.textContent=petEmojis[petLevel-1]||'🐭';
        petIntervalId=setInterval(()=>{
          const bonus=petLevel*2;
          seeds+=bonus;updateUI();
          showToast(`Pet found ${bonus}🌰`);
          saveGame();
        },30000);
      }
      function activatePet(){
        if(petActive)return;
        petActive=true;petLevel=1;
        startPet();
      }

      function stopPet(){
        if(petIntervalId){ clearInterval(petIntervalId); petIntervalId=null; }
        petComp.style.display='none';
      }

      // UI
      function updateUI(){seedsDisplay.textContent=Math.floor(seeds);crystalsDisplay.textContent=Math.floor(crystals);}
      function updateCombo(dm){
        if(comboTimer>0){comboTimer-=dm;comboFill.style.width=Math.min(100,(comboTimer/COMBO_TIMEOUT)*100)+'%';}
        else{combo=1;comboFill.style.width='0%';}
        comboLabel.textContent=combo>1?`x${combo}`:'';
      }

      let autoAcc=0;
      function updateAuto(dt){
        if(upgrades.autoTapper.level>0){
          let r=upgrades.autoTapper.level*upgrades.autoTapper.value*permMultiplier;
          if(activeBoost.fastAuto>0)r*=2;
          autoAcc+=r*dt;
          if(autoAcc>=1){const a=Math.floor(autoAcc);seeds+=a;autoAcc-=a;updateUI();if(Math.random()<0.2){const rect=kittyContainer.getBoundingClientRect();const ar=tapArena.getBoundingClientRect();spawnPaw(rect.left+rect.width/2-ar.left+Math.random()*30-15,rect.top+rect.height/2-ar.top-30-Math.random()*20);}}
        }
      }
      function updateParticles(dt){
        for(const p of particlePool){
          if(p.life<=0)continue;
          p.life-=dt;if(p.life<=0){p.el.style.opacity='0';continue;}
          p.vy+=120*dt;
          const y=parseFloat(p.el.style.top||'0')+p.vy*dt;
          const x=parseFloat(p.el.style.left||'0')+p.vx*dt;
          p.el.style.top=y+'px';p.el.style.left=x+'px';
          p.el.style.opacity=Math.min(1,p.life/0.2);
        }
      }
      function updateBoosts(dt){
        for(const k in activeBoost){if(activeBoost[k]>0){activeBoost[k]-=dt;if(activeBoost[k]<0)activeBoost[k]=0;}}
      }
      function updateBoss(dt){
        if(!boss){bossTimer-=dt;if(bossTimer<=0){spawnBoss();bossTimer=BOSS_COOLDOWN;}}
      }
      function spawnBoss(){
        boss={hp:100,maxHp:100};
        const el=document.createElement('div');el.id='bossRat';el.style.cssText='position:absolute;font-size:50px;cursor:pointer;z-index:15;left:50%;top:20%;transform:translate(-50%,-50%)';el.textContent='🐀';
        const hp=document.createElement('div');hp.className='boss-hp-bar';hp.innerHTML='<div class="boss-hp-fill" id="bossHpFill" style="width:100%"></div>';
        tapArena.appendChild(el);tapArena.appendChild(hp);
        el.addEventListener('pointerdown',(e)=>{
          e.stopPropagation();
          let dmg=1+upgrades.tapPower.level*upgrades.tapPower.value;
          if(activeBoost.autoCrit>0)dmg*=3;
          else if(Math.random()<upgrades.critChance.level*upgrades.critChance.value)dmg*=3;
          boss.hp-=dmg;
          document.getElementById('bossHpFill').style.width=Math.max(0,(boss.hp/boss.maxHp)*100)+'%';
          playMeow(0.5);
          if(boss.hp<=0){
            const rewS=100+evolveStage*50,rewC=3+evolveStage;
            seeds+=rewS;crystals+=rewC;updateUI();
            showToast(`Boss defeated! +${rewS}🌰 +${rewC}💎`);
            el.remove();hp.remove();boss=null;bossTimer=BOSS_COOLDOWN;
            playMagicArp();saveGame();
          }
        });
      }

      // Тап
      function handleTap(e){
        if(e.target.closest('.btn,.modal,.close-modal,#bossRat'))return;
        e.preventDefault();initAudio();
        startMusic();
        const rect=tapArena.getBoundingClientRect();
        const x=e.clientX-rect.left,y=e.clientY-rect.top;
        const kr=kittyContainer.getBoundingClientRect();
        const kcx=kr.left+kr.width/2-rect.left,kcy=kr.top+kr.height/2-rect.top;
        const hitKitty=Math.hypot(x-kcx,y-kcy)<70;
        let val=1+upgrades.tapPower.level*upgrades.tapPower.value;
        let crit=false;
        if(activeBoost.autoCrit>0||Math.random()<(upgrades.critChance.level*upgrades.critChance.value*(hitKitty?1.5:1))){
          val*=3;crit=true;
        }
        if(activeBoost.doubleTap>0)val*=2;
        val*=permMultiplier*(1+upgrades.comboBoost.level*upgrades.comboBoost.value*(combo-1));
        if(hitKitty)val*=1.2;
        seeds+=val;

        if(challengeActive){
          challengeScore+=val;
          document.getElementById('challengeScore').textContent=Math.floor(challengeScore);
        }

        const now=Date.now();
        if(now-combotimestamp<COMBO_TIMEOUT)combo++;else combo=1;
        comboTimestamp=now;combo=Math.min(combo,30);comboTimer=COMBO_TIMEOUT;

        emitParticle(x,y-15,crit?`💥+${Math.floor(val)}`:`+${Math.floor(val)}`,crit?'#ffb347':'#fde4c3');
        spawnRipple(x,y);
        if(Math.random()<0.4)spawnPaw(x+Math.random()*20-10,y-15-Math.random()*10);
        if(Math.random()<0.2)spawnHeart(x+Math.random()*15-7,y-20-Math.random()*10);
        if(hitKitty){
          kittyContainer.classList.add('kitty-bounce');setTimeout(()=>kittyContainer.classList.remove('kitty-bounce'),300);
          showEmotion('😸');
        }else showEmotion('😊');
        if(crit){
          gameContainer.style.transform='translate(2px,-2px)';setTimeout(()=>gameContainer.style.transform='',60);
          playBling();
        }else{playMeow(0.8+combo*0.02);}
        playSeedShake();
        boostMood(1);

        totalTaps++;
        updateUI();
        checkAchievements();
        checkQuestProgress('tap',1);
        checkCardDrop();
        saveGame();
      }
      tapArena.addEventListener('pointerdown',handleTap);
      tapArena.addEventListener('touchstart',(e)=>{if(!e.target.closest('.btn,.modal,.close-modal'))e.preventDefault();},{passive:false});

      function checkCardDrop(){
        if(Math.random()<0.01){
          const nc=allCards[Math.floor(Math.random()*allCards.length)];
          if(!collectedCards.includes(nc)){
            collectedCards.push(nc);
            showToast(`🃏 New card: ${nc}!`);
            saveGame();
          }
        }
      }

      function checkAchievements(){
        achievementsList.forEach(a=>{
          if(unlockedAchievements.includes(a.id))return;
          let p=0;
          switch(a.id){
            case'first50':p=seeds;break;
            case'combo5':p=combo;break;
            case'tap300':p=totalTaps;break;
            case'evolve1':p=evolveStage>=1?1:0;break;
            case'crystal10':p=crystals;break;
          }
          if(p>=a.goal){
            unlockedAchievements.push(a.id);
            seeds+=a.rewardSeeds;crystals+=a.rewardCrystals;
            updateUI();playMagicArp();showToast(`🏆 ${a.name}!`);
            saveGame();
          }
        });
      }
      function generateQuests(){
        const t=new Date().toDateString();
        if(lastQuestDate===t&&dailyQuests.length)return;
        lastQuestDate=t;
        dailyQuests=[
          {id:'tap50',desc:'Tap 50 times',goal:50,progress:0,rewardSeeds:40,rewardCrystals:0},
          {id:'combo3',desc:'Combo x3',goal:3,progress:0,rewardSeeds:30,rewardCrystals:1},
          {id:'buy1',desc:'Buy 1 upgrade',goal:1,progress:0,rewardSeeds:50,rewardCrystals:0}
        ];
      }
      function checkQuestProgress(type,amount){
        dailyQuests.forEach(q=>{
          if(q.progress>=q.goal)return;
          if(type==='tap'&&q.id==='tap50')q.progress+=amount;
          if(type==='combo'&&q.id==='combo3'&&combo>=q.goal)q.progress=q.goal;
          if(type==='buy'&&q.id==='buy1')q.progress+=amount;
          if(q.progress>=q.goal){
            seeds+=q.rewardSeeds;crystals+=q.rewardCrystals;
            updateUI();playBling();showToast(`Quest completed!`);
            saveGame();
          }
        });
      }
      function getCost(upg){return Math.floor(upg.baseCost*Math.pow(upg.costMult,upg.level));}

      function renderShop(){
        const list=document.getElementById('shopList');list.innerHTML='';
        for(const [k,u] of Object.entries(upgrades)){
          const cost=getCost(u);
          const row=document.createElement('div');row.className='upgrade-row';
          row.innerHTML=`<div><strong>${u.name}</strong> (${u.level})</div><button class="buy-btn" data-key="${k}" ${seeds<cost?'disabled':''}>🌰${cost}</button>`;
          list.appendChild(row);
        }
        list.onclick=e=>{
          const btn=e.target.closest('.buy-btn');if(!btn||btn.disabled)return;
          const key=btn.dataset.key,upg=upgrades[key],cost=getCost(upg);
          if(seeds>=cost){seeds-=cost;upg.level++;updateUI();renderShop();playSeedShake();checkQuestProgress('buy',1);saveGame();}
        };
      }

      function renderBoostShop(){
        const c=document.getElementById('boostList');
        const b=[{id:'doubleTap',name:'Double Tap 20s',cost:2,eff:()=>{activeBoost.doubleTap=20;showToast('Double tap!');}},{id:'autoCrit',name:'Auto Crit 15s',cost:3,eff:()=>{activeBoost.autoCrit=15;showToast('Crit!');}},{id:'fastAuto',name:'Fast Auto 30s',cost:3,eff:()=>{activeBoost.fastAuto=30;showToast('Fast auto!');}}];
        c.innerHTML='';
        b.forEach(x=>{
          const r=document.createElement('div');r.className='upgrade-row';
          r.innerHTML=`<div>${x.name}</div><button class="buy-btn" ${crystals<x.cost?'disabled':''}>💎${x.cost}</button>`;
          r.querySelector('.buy-btn').addEventListener('click',()=>{if(crystals>=x.cost){crystals-=x.cost;x.eff();updateUI();renderBoostShop();saveGame();playBling();}});
          c.appendChild(r);
        });
      }

      function renderCustomShop(){
        const hdiv=document.getElementById('hatShop');hdiv.innerHTML='';
        hats.forEach(h=>{const btn=document.createElement('button');btn.className='buy-btn';btn.textContent=h.cost>0?`${h.emoji} ${h.name} 💎${h.cost}`:`${h.name} (free)`;btn.disabled=(crystals<h.cost)||(h.id===currentHat);btn.onclick=()=>{if(crystals>=h.cost){crystals-=h.cost;currentHat=h.id;hatSlot.textContent=h.emoji||'';updateUI();renderCustomShop();saveGame();playSeedShake();}};hdiv.appendChild(btn);});
        const bdiv=document.getElementById('bgShop');bdiv.innerHTML='';
        backgrounds.forEach(b=>{const btn=document.createElement('button');btn.className='buy-btn';btn.textContent=b.cost>0?`${b.name} 💎${b.cost}`:`${b.name} (free)`;btn.disabled=(crystals<b.cost)||(b.id===currentBg);btn.onclick=()=>{if(crystals>=b.cost){crystals-=b.cost;currentBg=b.id;document.body.style.background=b.color;updateUI();renderCustomShop();saveGame();playSeedShake();}};bdiv.appendChild(btn);});
        const sdiv=document.getElementById('skinShop');sdiv.innerHTML='';
        skins.forEach(s=>{const btn=document.createElement('button');btn.className='buy-btn';btn.textContent=s.cost>0?`${s.emoji} ${s.name} 💎${s.cost}`:`${s.name} (free)`;btn.disabled=(crystals<s.cost)||(s.id===currentSkin);btn.onclick=()=>{if(crystals>=s.cost){crystals-=s.cost;currentSkin=s.id;document.getElementById('baseKitty').textContent=s.emoji;updateUI();renderCustomShop();saveGame();playSeedShake();}};sdiv.appendChild(btn);});
        document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',function(){
          document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));this.classList.add('active');
          document.getElementById('hatShop').style.display=this.dataset.tab==='hats'?'block':'none';
          document.getElementById('bgShop').style.display=this.dataset.tab==='backgrounds'?'block':'none';
          document.getElementById('skinShop').style.display=this.dataset.tab==='skins'?'block':'none';
        }));
      }

      function renderEvolve(){
        const c=document.getElementById('evolveContent');const n=evolveStage+1;
        if(n>=evolveCost.length){c.innerHTML='<p>Max evolution!</p>';return;}
        const need=evolveCost[n];
        c.innerHTML=`<p>${evolveNames[evolveStage]} → ${evolveNames[n]}</p><p>Need 🌰${need}</p>${seeds>=need?'<button class="btn" id="evolveNow">Evolve!</button>':'<p>Not enough</p>'}`;
        if(seeds>=need){setTimeout(()=>document.getElementById('evolveNow')?.addEventListener('click',()=>{seeds=0;combo=1;comboTimer=0;Object.values(upgrades).forEach(u=>u.level=0);autoAcc=0;totalTaps=0;evolveStage++;permMultiplier*=1.6;crystals+=2+evolveStage;document.getElementById('baseKitty').textContent=evolveNames[evolveStage].split(' ')[0];updateUI();playMagicArp();showToast('Evolved!');closeModal('evolveModal');saveGame();checkAchievements();}),10);}
      }

      function dailyReward(){
        const t=new Date().toDateString();
        if(localStorage.getItem('kittyDailyDate')===t){document.getElementById('dailyContent').innerHTML='<p>Already claimed</p>';}
        else{
          const prev=localStorage.getItem('kittyDailyDate');
          const y=new Date(Date.now()-86400000).toDateString();
          if(prev===y)dailyStreak=Math.min(dailyStreak+1,7);else dailyStreak=1;
          const b=40+evolveStage*10;
          const tot=b+Math.floor(b*(dailyStreak*0.1));
          const cry=1+Math.floor(evolveStage/2)+dailyStreak;
          document.getElementById('dailyContent').innerHTML=`<p>🌰${tot} 💎${cry}</p><p>Streak:${dailyStreak}🔥</p><button class="btn" id="claimDailyBtn">Claim</button>`;
          setTimeout(()=>document.getElementById('claimDailyBtn')?.addEventListener('click',()=>{seeds+=tot;crystals+=cry;localStorage.setItem('kittyDailyDate',t);updateUI();saveGame();playMagicArp();closeModal('dailyModal');generateQuests();}),10);
        }
      }

      let miniGameActive=false;
      function startMiniGame(){
        if(miniGameActive)return;miniGameActive=true;
        const a=document.getElementById('miniGameArea');a.innerHTML='';let caught=0;
        const d=document.getElementById('miniCaught');d.textContent='0';
        function spawn(){
          if(!miniGameActive||caught>=10)return;
          const s=document.createElement('div');s.className='falling-star';s.textContent='⭐';
          s.style.left=Math.random()*80+'%';s.style.animationDuration=(2+Math.random()*2)+'s';
          s.addEventListener('pointerdown',e=>{e.stopPropagation();caught++;d.textContent=caught;s.remove();playMeow(1.2);if(caught>=10)end();});
          a.appendChild(s);
          setTimeout(()=>{if(s.parentNode)s.remove();if(miniGameActive&&caught<10)spawn();},2500);
        }
        function end(){const r=caught*2;seeds+=r;updateUI();playMagicArp();showToast(`+${r}🌰`);closeModal('miniGameModal');saveGame();}
        for(let i=0;i<3;i++)setTimeout(spawn,i*400);
      }
      function stopMiniGame(){miniGameActive=false;}

      function renderCollection(){
        const g=document.getElementById('collectionGrid');g.innerHTML='';
        allCards.forEach(c=>{const s=document.createElement('span');s.style.fontSize='2rem';s.textContent=collectedCards.includes(c)?c:'❓';g.appendChild(s);});
      }

      function startChallenge(){
        if(challengeActive)return;
        challengeActive=true;challengeScore=0;challengeTimer=60;
        document.getElementById('challengeScore').textContent='0';
        document.getElementById('challengeTimer').textContent='60';
        openModal('challengeModal');
        if(challengeIntervalId) clearInterval(challengeIntervalId);
        challengeIntervalId=setInterval(()=>{
          challengeTimer--;
          document.getElementById('challengeTimer').textContent=challengeTimer;
          if(challengeTimer<=0){
            clearInterval(challengeIntervalId);
            challengeIntervalId=null;
            challengeActive=false;
            const reward=challengeScore;
            seeds+=reward;updateUI();
            showToast(`Challenge complete! +${reward}🌰`);
            closeModal('challengeModal');
            saveGame();
          }
        },1000);
      }

      function openModal(id){document.getElementById(id).classList.add('open');}
      function closeModal(id){
        document.getElementById(id).classList.remove('open');
        if(id==='miniGameModal') stopMiniGame();
        if(id==='challengeModal'){
          if(challengeIntervalId){clearInterval(challengeIntervalId);challengeIntervalId=null;}
          challengeActive=false;
        }
      }

      function saveGame(){
        const data={seeds,crystals,combo,comboTimestamp,upgrades:JSON.parse(JSON.stringify(upgrades)),evolveStage,permMultiplier,totalTaps,currentHat,currentBg,currentSkin,unlockedAchievements,dailyStreak,lastDailyDate,lastQuestDate,dailyQuests,collectedCards,activeBoost,boss,bossTimer,lastSaveTime:Date.now(),mood,petActive,petLevel};
        localStorage.setItem('kittyCatCuteSave',JSON.stringify(data));
        if(tg?.CloudStorage)tg.CloudStorage.setItem('kittyCatCuteSave',JSON.stringify(data));
      }
      function loadGame(){
        const raw=localStorage.getItem('kittyCatCuteSave');
        if(raw){
          try{
            const d=JSON.parse(raw);
            seeds=d.seeds||0;crystals=d.crystals||0;combo=d.combo||1;comboTimestamp=d.combotimestamp||0;
            if(d.upgrades)Object.assign(upgrades,d.upgrades);
            evolveStage=d.evolveStage||0;permMultiplier=d.permMultiplier||1;totalTaps=d.totalTaps||0;
            currentHat=d.currentHat||null;currentBg=d.currentBg||null;currentSkin=d.currentSkin||'default';
            unlockedAchievements=d.unlockedAchievements||[];
            dailyStreak=d.dailyStreak||0;lastDailyDate=d.lastDailyDate||null;
            lastQuestDate=d.lastQuestDate||null;if(d.dailyQuests)dailyQuests=d.dailyQuests;
            collectedCards=d.collectedCards||[];
            if(d.activeBoost)activeBoost=d.activeBoost;
            boss=d.boss||null;bossTimer=d.bossTimer||BOSS_COOLDOWN;
            lastSaveTime=d.lastSaveTime||Date.now();
            mood=d.mood!==undefined?d.mood:100;
            petActive=d.petActive||false;petLevel=d.petLevel||0;

            if(combo>1){const e=Date.now()-comboTimestamp;if(e<COMBO_TIMEOUT)comboTimer=COMBO_TIMEOUT-e;else{combo=1;comboTimer=0;}}
            hatSlot.textContent=hats.find(h=>h.id===currentHat)?.emoji||'';
            const bg=backgrounds.find(b=>b.id===currentBg);
            if(bg)document.body.style.background=bg.color;
            const sk=skins.find(s=>s.id===currentSkin);
            if(sk)document.getElementById('baseKitty').textContent=sk.emoji;
            updateUI();
            if(petActive) startPet();
            if(lastSaveTime){
              const off=(Date.now()-lastSaveTime)/1000;
              const earn=upgrades.autoTapper.level*upgrades.autoTapper.value*permMultiplier*off*0.5;
              if(earn>0){seeds+=earn;showToast(`+${Math.floor(earn)}🌰 while away`,3000);updateUI();}
            }
          }catch(e){}
        }
        generateQuests();updateSeason();
        if(boss) setTimeout(spawnBoss,100); // восстановить босса
      }

      function bindUI(){
        document.querySelectorAll('.close-modal').forEach(b=>b.addEventListener('click',function(){const m=this.closest('.modal');if(m)closeModal(m.id);}));
        document.getElementById('shopBtn').addEventListener('click',()=>{renderShop();openModal('shopModal');});
        document.getElementById('boostBtn').addEventListener('click',()=>{renderBoostShop();openModal('boostModal');});
        document.getElementById('customBtn').addEventListener('click',()=>{renderCustomShop();openModal('customModal');});
        document.getElementById('questsBtn').addEventListener('click',()=>{
          const ql=document.getElementById('questList');ql.innerHTML='';
          dailyQuests.forEach(q=>{const d=document.createElement('div');d.className='quest-row';d.textContent=`${q.desc} [${Math.min(q.progress,q.goal)}/${q.goal}] ${q.progress>=q.goal?'✅':''}`;ql.appendChild(d);});
          openModal('questsModal');
        });
        document.getElementById('achievementsBtn').addEventListener('click',()=>{
          const al=document.getElementById('achList');al.innerHTML='';
          achievementsList.forEach(a=>{const done=unlockedAchievements.includes(a.id);const d=document.createElement('div');d.className='ach-row';d.innerHTML=`${done?'✅':'🔒'} ${a.name}`;al.appendChild(d);});
          openModal('achievementsModal');
        });
        document.getElementById('dailyBtn').addEventListener('click',()=>{dailyReward();openModal('dailyModal');});
        document.getElementById('evolveBtn').addEventListener('click',()=>{renderEvolve();openModal('evolveModal');});
        document.getElementById('challengeBtn').addEventListener('click',startChallenge);
        document.getElementById('collectionBtn')?.addEventListener('click',()=>{renderCollection();openModal('collectionModal');});

        const shareBtn=document.createElement('button');shareBtn.className='btn';shareBtn.textContent='📤 Share';
        shareBtn.addEventListener('click',()=>{
          const msg=`🐱 I collected ${Math.floor(seeds)} seeds in Cat Cute! https://t.me/CatCuteMobileBot/CatCute`;
          if(tg)tg.openTelegramLink(`https://t.me/share/url?url=https://t.me/CatCuteMobileBot/CatCute&text=${encodeURIComponent(msg)}`);
          else navigator.clipboard?.writeText(msg).then(()=>showToast('Link copied!'));
        });
        document.querySelector('.btn-row').appendChild(shareBtn);

        const miniBtn=document.createElement('button');miniBtn.className='btn';miniBtn.textContent='🌟 Mini Game';
        miniBtn.addEventListener('click',()=>{openModal('miniGameModal');startMiniGame();});
        document.querySelector('.btn-row').appendChild(miniBtn);
      }

      let lastTime=performance.now();
      function loop(now){
        const dt=Math.min(0.1,(now-lastTime)/1000);lastTime=now;
        updateCombo(dt*1000);updateAuto(dt);updateParticles(dt);updateBoosts(dt);updateBoss(dt);updateMood(dt);
        requestAnimationFrame(loop);
      }

      loadGame();bindUI();requestAnimationFrame(loop);

      window.addEventListener('beforeunload',()=>{
        stopMusic();
        stopPet();
        if(challengeIntervalId) clearInterval(challengeIntervalId);
        saveGame();
      });
    })();
  </script>
</body>
</html>
